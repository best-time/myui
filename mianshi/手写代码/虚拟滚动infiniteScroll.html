<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>原生JS 虚拟滚动 Select（终极优化）</title>
  <style>
      .select-box { position: relative; width: 280px; margin: 50px; }
      .select-input {
          padding: 8px 12px;
          border: 1px solid #ccc;
          cursor: pointer;
          border-radius: 4px;
          user-select: none;
      }
      .dropdown {
          position: absolute;
          top: 42px;
          left: 0;
          right: 0;
          max-height: 250px;
          overflow-y: auto;
          border: 1px solid #ccc;
          background: #fff;
          display: none;
          border-radius: 4px;
      }
      .scroll-container {
          position: relative;
          width: 100%;
      }
      .option {
          position: absolute;
          top: 0;
          left: 0;
          right: 0;
          height: 36px;
          line-height: 36px;
          padding: 0 12px;
          cursor: pointer;
      }
      .option:hover {
          background: #f5f5f5;
      }
      .load-tip {
          text-align: center;
          padding: 8px;
          color: #666;
      }
  </style>
</head>
<body>

<div class="select-box">
  <div class="select-input" id="selectInput">请选择</div>
  <div class="dropdown" id="dropdown">
    <div class="scroll-container" id="scrollContainer"></div>
    <div class="load-tip" id="loadTip">加载中...</div>
  </div>
</div>

<script>
  // ==================== 配置 ====================
  const itemHeight = 36;       // 每条高度（固定）
  const visibleCount = 7;      // 可视条数
  const pageSize = 50;         // 每次加载50条（海量）

  // ==================== DOM 缓存 ====================
  const selectInput = document.getElementById('selectInput');
  const dropdown = document.getElementById('dropdown');
  const scrollContainer = document.getElementById('scrollContainer');
  const loadTip = document.getElementById('loadTip');

  // ==================== 状态 ====================
  let list = [];
  let page = 1;
  let loading = false;
  let hasMore = true;

  // ==================== 模拟接口 ====================
  function fetchData() {
    return new Promise((resolve) => {
      setTimeout(() => {
        const data = Array.from({ length: pageSize }, (_, i) => ({
          value: (page - 1) * pageSize + i + 1,
          label: `选项 ${(page - 1) * pageSize + i + 1}`
        }));
        resolve(data);
      }, 400);
    });
  }

  // ==================== 虚拟滚动核心渲染 ====================
  function renderVirtualList() {
    const { scrollTop, clientHeight } = dropdown;

    // 1. 计算起始索引
    const start = Math.floor(scrollTop / itemHeight);

    // 2. 计算结束索引（前后多渲染2条）
    const end = start + visibleCount + 2;

    // 3. 截取要显示的数据
    const showList = list.slice(start, end);

    // 4. 清空容器
    scrollContainer.innerHTML = '';

    // 5. 设置容器总高度（撑开滚动条）
    scrollContainer.style.height = `${list.length * itemHeight}px`;

    // 6. 渲染可视区域DOM
    showList.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'option';
      div.innerText = item.label;
      div.style.top = `${(start + i) * itemHeight}px`;

      div.onclick = () => {
        selectInput.innerText = item.label;
        dropdown.style.display = 'none';
      };

      scrollContainer.appendChild(div);
    });
  }

  // ==================== 加载更多 ====================
  async function loadMore() {
    if (!hasMore || loading) return;
    loading = true;
    loadTip.innerText = '加载中...';

    const newData = await fetchData();
    list = [...list, ...newData];
    page++;

    renderVirtualList();
    loading = false;

    if (page > 20) hasMore = false;
    loadTip.innerText = hasMore ? '上拉加载更多' : '没有更多了';
  }

  // ==================== 滚动触发虚拟渲染 + 加载更多 ====================
  dropdown.addEventListener('scroll', () => {
    renderVirtualList();

    const { scrollTop, scrollHeight, clientHeight } = dropdown;
    if (scrollTop + clientHeight + 50 >= scrollHeight) {
      loadMore();
    }
  });

  // ==================== 点击展开 ====================
  selectInput.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = dropdown.style.display === 'block';
    dropdown.style.display = isOpen ? 'none' : 'block';
    if (!isOpen && list.length === 0) loadMore();
  });

  document.addEventListener('click', () => {
    dropdown.style.display = 'none';
  });
</script>
</body>
</html>
